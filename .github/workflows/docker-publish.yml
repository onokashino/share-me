name: Publish images

# Builds the web + api images and pushes them to the GitHub Container Registry
# (ghcr.io). Uses the built-in GITHUB_TOKEN — no extra secrets to configure.
#
# Images:  ghcr.io/<owner>/share-me-web  and  ghcr.io/<owner>/share-me-api
#   :latest      -> the default branch
#   :<short-sha> -> every push
#   :1.2.3 / 1.2 -> git tags like v1.2.3
#
# First run publishes the packages as *private*; make them public once via
# GitHub → your profile → Packages → <pkg> → Package settings → Change visibility.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: share-me-web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: share-me-api
            context: apps/api
            dockerfile: apps/api/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
